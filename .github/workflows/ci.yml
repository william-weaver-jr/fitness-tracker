name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps
        run: pip install -e ".[dev]"
      - name: ruff
        run: ruff check src tests scripts
      - name: black
        run: black --check src tests scripts
      - name: mypy
        run: mypy src

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps (without oracledb)
        run: |
          pip install "fastapi>=0.115.0" "uvicorn[standard]>=0.32.0" "pydantic[email]>=2.9.0" \
            "pydantic-settings>=2.6.0" "httpx>=0.27.0" "python-dateutil>=2.9.0" \
            "orjson>=3.10.0" "structlog>=24.4.0" \
            "pytest>=8.3.0" "pytest-asyncio>=0.24.0" "pytest-cov>=6.0.0" \
            "hypothesis>=6.115.0" "polyfactory>=2.18.0" "faker>=30.0.0" \
            "freezegun>=1.5.0" "respx>=0.21.1" httpx2
          pip install -e . --no-deps
      - name: Unit tests
        run: pytest tests/unit/ -m unit --no-cov -q

  integration-tests:
    name: Integration Tests (Oracle)
    runs-on: ubuntu-latest
    services:
      oracle:
        image: gvenzl/oracle-free:23-slim
        env:
          ORACLE_RANDOM_PASSWORD: "true"
          APP_USER: fittrack_app
          APP_USER_PASSWORD: fittrack_dev_password_change_me
        ports:
          - 1521:1521
        options: >-
          --health-cmd "healthcheck.sh"
          --health-interval 20s
          --health-timeout 10s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps
        run: pip install -e ".[dev]"
      - name: Run migrations
        env:
          ORACLE_HOST: localhost
          ORACLE_PORT: 1521
          ORACLE_SERVICE_NAME: FREEPDB1
          ORACLE_USER: fittrack_app
          ORACLE_PASSWORD: fittrack_dev_password_change_me
        run: python -m fittrack.database.migrations apply
      - name: Integration tests with coverage
        env:
          ORACLE_HOST: localhost
          ORACLE_PORT: 1521
          ORACLE_SERVICE_NAME: FREEPDB1
          ORACLE_USER: fittrack_app
          ORACLE_PASSWORD: fittrack_dev_password_change_me
        run: pytest tests/integration/ -m integration -q
